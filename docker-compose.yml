services:
  smb-proxy:
    build: .
    container_name: smb-proxy
    restart: unless-stopped
    privileged: true
    ports:
      - "1445:445"
    environment:
      SMB_PROXY_MODE: gateway
      SMB_HOST: 192.168.1.100
      SMB_SHARE: data
      SMB_USER: smbuser
      SMB_PASSWORD: changeme
      SMB_DOMAIN: ""
      LOCAL_SHARE: proxy
      LOCAL_USER: proxy
      LOCAL_PASSWORD: localpass
      LOCAL_ALLOW_GUEST: "false"
